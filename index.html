<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KOVA Song Archive - Portfolio</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background": "#fdf9f1",
                        "kova-green": "#7ed321",
                        "kova-gray": "#9a9a9a"
                    },
                    fontFamily: {
                        "body-md": ["Hanken Grotesk"],
                        "label-technical": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        .sidebar {
            height: calc(100vh - 140px);
            position: sticky;
            top: 100px;
        }

        .portfolio-item {
            transition: all 400ms cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(0,0,0,0.08);
        }
        
        .portfolio-item:hover {
            border-color: #7ed321;
            border-width: 3px;
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        /* Estilo de filtros */
        .filter-btn {
            text-align: left;
            transition: all 300ms ease;
            border-left: 3px solid transparent;
            font-size: 13px;
            letter-spacing: 0.1em;
            padding: 10px 0 10px 1.5rem;
            color: #9a9a9a;
            width: 100%;
        }

        .filter-btn.active {
            border-left: 3px solid #7ed321;
            color: #000;
            padding-left: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, rgba(126, 211, 33, 0.05), transparent);
        }

        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }

        .dropdown-active .dropdown-content {
            max-height: 500px;
        }

        .dropdown-trigger::after {
            content: 'expand_more';
            font-family: 'Material Symbols Outlined';
            float: right;
            transition: transform 0.3s;
        }

        .dropdown-active .dropdown-trigger::after {
            transform: rotate(180deg);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #fdf9f1; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body class="bg-background text-primary min-h-screen font-body-md antialiased overflow-x-hidden">
    
    <header class="w-full border-b border-black/5 px-6 md:px-12 py-10 flex justify-between items-center bg-background/80 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-3xl font-bold tracking-tighter uppercase">KOVA Song Archive</h1>
        <div class="font-label-technical text-[10px] text-kova-gray tracking-[0.3em] uppercase">Audio Portfolio // Archive</div>
    </header>

    <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row px-6 md:px-12 py-16 gap-16">
        
        <aside class="w-full md:w-72 shrink-0">
            <div class="sidebar flex flex-col gap-8">
                
                <button onclick="resetFilters(this)" class="filter-btn active mb-4">All Projects</button>

                <div class="dropdown-active" id="genre-dropdown">
                    <button onclick="toggleDropdown('genre-dropdown')" class="dropdown-trigger w-full text-left font-label-technical text-[12px] text-black uppercase tracking-[0.2em] mb-4 border-b border-black/5 pb-2">
                        Género
                    </button>
                    <div id="genre-container" class="dropdown-content flex flex-col gap-1 font-label-technical">
                        </div>
                </div>

                <div class="dropdown-active" id="date-dropdown">
                    <button onclick="toggleDropdown('date-dropdown')" class="dropdown-trigger w-full text-left font-label-technical text-[12px] text-black uppercase tracking-[0.2em] mb-4 border-b border-black/5 pb-2">
                        Año
                    </button>
                    <div id="date-container" class="dropdown-content flex flex-col gap-1 font-label-technical">
                        </div>
                </div>
                
                <div class="mt-auto pb-12 opacity-30">
                    <p class="font-label-technical text-[9px] leading-relaxed uppercase tracking-tighter">
                        KOVA Recording Studio<br>
                        Digital Ledger 2026
                    </p>
                </div>
            </div>
        </aside>

        <main class="flex-grow">
            <div class="grid grid-cols-1 gap-10" id="archive-container">
                <div class="text-center py-20 animate-pulse" id="loading-state">
                    <span class="font-label-technical text-xs uppercase tracking-widest opacity-50">Loading Metadata...</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCZ5H_tX3r41I_npaw0nNJWxoGGucLKvTO2mC0w1SdSm8g7T1nEte1wcVhldjT14u-tygZMCnt9eVY/pub?gid=0&single=true&output=csv';
        let allSongs = [];

        async function fetchArchive() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/);
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                
                allSongs = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const obj = {};
                    headers.forEach((header, index) => {
                        obj[header] = (values[index] || "").trim().replace(/^"|"$/g, '');
                    });
                    allSongs.push(obj);
                }

                renderFilters();
                renderItems(allSongs);
                document.getElementById('loading-state')?.remove();
            } catch (e) { console.error(e); }
        }

        function toggleDropdown(id) {
            document.getElementById(id).classList.toggle('dropdown-active');
        }

        function renderFilters() {
            // Géneros
            const genreContainer = document.getElementById('genre-container');
            const genres = [...new Set(allSongs.map(s => s.Genre).filter(g => g))].sort();
            genres.forEach(genre => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = genre;
                btn.onclick = (e) => applyFilter('Genre', genre, e.target);
                genreContainer.appendChild(btn);
            });

            // Años (Extrae el año de la fecha)
            const dateContainer = document.getElementById('date-container');
            const years = [...new Set(allSongs.map(s => {
                const parts = s.Date.split('/');
                return parts.length === 3 ? parts[2] : s.Date;
            }).filter(y => y))].sort((a,b) => b - a);

            years.forEach(year => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = year;
                btn.onclick = (e) => applyFilter('Date', year, e.target);
                dateContainer.appendChild(btn);
            });
        }

        function applyFilter(key, value, btnElement) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            const filtered = allSongs.filter(s => s[key].includes(value));
            renderItems(filtered);
        }

        function resetFilters(btnElement) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderItems(allSongs);
        }

        function renderItems(items) {
            const container = document.getElementById('archive-container');
            container.innerHTML = items.length ? '' : '<div class="text-center py-20 font-label-technical text-kova-gray uppercase text-xs">No matching tracks found</div>';

            items.forEach(item => {
                const coverContent = (item.Cover && item.Cover.trim() !== "") 
                    ? `<img alt="${item.Song}" class="w-full h-full object-cover grayscale contrast-125 transition-all duration-700 group-hover:grayscale-0 group-hover:scale-110" src="${item.Cover}" onerror="this.parentElement.innerHTML='<span class=\'material-symbols-outlined text-5xl text-kova-gray opacity-20\'>album</span>'"/>`
                    : `<span class="material-symbols-outlined text-5xl text-kova-gray opacity-20">album</span>`;

                const html = `
                    <div class="portfolio-item group bg-[#ede9e1] relative flex flex-col md:flex-row items-center justify-between p-8 md:p-10 gap-8 overflow-hidden">
                        <span class="absolute top-4 right-6 font-label-technical text-[9px] text-kova-gray uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">KOVA RS // ${item.Genre.toUpperCase()}</span>
                        
                        <div class="flex flex-col md:flex-row items-center gap-10 w-full">
                            <div class="w-32 h-32 md:w-28 md:h-28 shrink-0 bg-white border border-black/5 flex items-center justify-center shadow-inner overflow-hidden">
                                ${coverContent}
                            </div>
                            <div class="flex flex-col gap-2 w-full text-center md:text-left">
                                <h2 class="text-2xl md:text-3xl font-bold tracking-tight text-[#0b0b0b]">${item.Song}</h2>
                                <p class="text-md text-kova-gray font-medium uppercase tracking-wider">${item.Artist}</p>
                                <div class="flex flex-wrap justify-center md:justify-start gap-4 mt-6 font-label-technical text-[10px] text-kova-gray uppercase tracking-[0.15em]">
                                    <span class="bg-black/[0.03] px-3 py-1.5">${item.Genre}</span>
                                    <span class="bg-black/[0.03] px-3 py-1.5">${item.Date}</span>
                                    <span class="bg-black/[0.03] px-3 py-1.5">${item.Credits}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center w-full md:w-auto">
                            <a href="${item.Link}" target="_blank" class="w-full md:w-auto bg-black text-white px-12 py-5 font-label-technical text-[11px] uppercase tracking-[0.25em] hover:bg-kova-green hover:text-black transition-all">Open</a>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        document.addEventListener('DOMContentLoaded', fetchArchive);
    </script>
</body>
</html>
