<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KOVA Song Archive - Portfolio Visualizer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background": "#fdf9f1",
                        "on-background": "#1c1c17",
                        "surface-container": "#f1ede5",
                        "secondary": "#5e5e5e",
                        "kova-green": "#7ed321"
                    },
                    fontFamily: {
                        "body-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "label-technical": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .album-cover-transition { transition: all 500ms ease-in-out; }
        .album-cover-transition:hover { filter: grayscale(0); }
        /* Efecto de borde KOVA sin difuminado */
        .portfolio-item {
            transition: border-color 300ms ease-in-out;
            border-width: 2px;
            border-color: rgba(0,0,0,0.1);
        }
        .portfolio-item:hover {
            border-color: #7ed321;
        }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-kova-green selection:text-black">
    
    <header class="bg-background w-full border-b border-on-surface/10 flex justify-between items-center px-6 md:px-10 py-6 md:py-8">
        <h1 class="text-2xl md:text-3xl font-bold tracking-tighter text-primary uppercase">KOVA Song Archive</h1>
        <nav class="hidden md:flex gap-8 font-label-technical text-xs uppercase tracking-widest">
            <a class="border-b border-primary pb-1" href="#">Archive</a>
            <a class="opacity-40 hover:opacity-100 transition-opacity" href="#">Technical Specs</a>
        </nav>
    </header>

    <main class="flex-grow px-4 md:px-10 py-12 md:py-20 flex flex-col items-center">
        <div class="w-full max-w-4xl flex flex-col gap-6 md:gap-8" id="archive-container">
            <div class="text-center py-20 animate-pulse" id="loading-state">
                <span class="font-label-technical text-xs uppercase tracking-widest opacity-50 text-[#9a9a9a]">Connecting to database / 48kHz...</span>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-on-surface/10 flex flex-col md:flex-row justify-between items-center px-10 gap-4">
        <span class="font-label-technical text-[10px] text-[#9a9a9a] uppercase tracking-widest">© 2026 KOVA RS / 48kHz</span>
        <div class="flex gap-6">
            <span class="font-label-technical text-[10px] text-[#9a9a9a] uppercase tracking-widest">Boutique Studio</span>
        </div>
    </footer>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCZ5H_tX3r41I_npaw0nNJWxoGGucLKvTO2mC0w1SdSm8g7T1nEte1wcVhldjT14u-tygZMCnt9eVY/pub?gid=0&single=true&output=csv';

        async function fetchArchive() {
            const container = document.getElementById('archive-container');
            const loading = document.getElementById('loading-state');
            
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/);
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                const items = [];
                
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const obj = {};
                    headers.forEach((header, index) => {
                        obj[header] = (values[index] || "").trim().replace(/^"|"$/g, '');
                    });
                    items.push(obj);
                }

                if (loading) loading.remove();

                items.forEach(item => {
                    const coverContent = (item.Cover && item.Cover.trim() !== "") 
                        ? `<img alt="${item.Song}" class="w-full h-full object-cover grayscale contrast-125 album-cover-transition hover:grayscale-0" 
                                 src="${item.Cover}" 
                                 onerror="this.parentElement.innerHTML='<div class=\'w-full h-full bg-[#f1ede5] flex items-center justify-center\'><span class=\'material-symbols-outlined text-4xl text-[#9a9a9a] opacity-40\'>album</span></div>'"/>`
                        : `<div class="w-full h-full bg-[#f1ede5] flex items-center justify-center">
                                <span class="material-symbols-outlined text-4xl text-[#9a9a9a] opacity-40">album</span>
                           </div>`;

                    const html = `
                        <div class="portfolio-item bg-[#ede9e1] relative flex flex-col md:flex-row items-center justify-between p-6 md:p-10 gap-6 md:gap-8 group">
                            <span class="absolute top-3 right-4 md:top-4 md:right-6 font-label-technical text-[9px] md:text-[10px] text-[#9a9a9a] uppercase tracking-widest opacity-80">KOVA RS / 48kHz</span>
                            
                            <div class="flex flex-col md:flex-row items-center text-center md:text-left gap-6 md:gap-10 w-full">
                                <div class="w-32 h-32 md:w-28 md:h-28 overflow-hidden shrink-0 bg-white border border-black/5 flex items-center justify-center shadow-sm">
                                    ${coverContent}
                                </div>

                                <div class="flex flex-col gap-1 w-full">
                                    <h2 class="text-xl md:text-2xl text-[#0b0b0b] font-bold tracking-tight">${item.Song || 'Unknown'}</h2>
                                    <p class="text-sm md:text-base text-[#0b0b0b] opacity-90">${item.Artist || 'Artist'}</p>
                                    
                                    <div class="flex flex-row flex-wrap justify-center md:justify-start gap-x-3 gap-y-1 mt-4 md:mt-3">
                                        <span class="font-label-technical text-[10px] text-[#9a9a9a] uppercase tracking-widest">${item.Date || '---'}</span>
                                        <span class="text-[#9a9a9a] text-[10px] hidden md:inline">•</span>
                                        <span class="font-label-technical text-[10px] text-[#9a9a9a] uppercase tracking-widest">${item.Genre || 'GENRE'}</span>
                                        <span class="text-[#9a9a9a] text-[10px] hidden md:inline">•</span>
                                        <span class="font-label-technical text-[10px] text-[#9a9a9a] uppercase tracking-widest">${item.Credits || 'Full Credits'}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="flex items-center w-full md:w-auto">
                                <a href="${item.Link || '#'}" target="_blank" 
                                   class="w-full md:w-auto border border-primary bg-primary text-white px-10 py-3 md:py-4 font-label-technical text-[10px] md:text-[11px] uppercase tracking-[0.2em] hover:bg-transparent hover:text-black transition-all text-center">
                                    Escuchar
                                </a>
                            </div>
                        </div>`;
                    container.insertAdjacentHTML('beforeend', html);
                });

            } catch (e) {
                console.error(e);
                if (loading) {
                    loading.innerHTML = `<span class="text-red-500 font-label-technical text-xs uppercase">Error: Check CSV Connection</span>`;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', fetchArchive);
    </script>
</body>
</html>
