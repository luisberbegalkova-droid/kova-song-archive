<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KOVA Song Archive - Portfolio Visualizer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background": "#fdf9f1",
                        "on-background": "#1c1c17",
                        "surface-container": "#f1ede5",
                        "secondary": "#5e5e5e"
                    },
                    fontFamily: {
                        "body-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "label-technical": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .album-cover-transition { transition: all 500ms ease-in-out; }
        .album-cover-transition:hover { filter: grayscale(0); }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased">
    <header class="bg-background w-full border-b border-on-surface/10 flex justify-between items-center px-10 py-8">
        <h1 class="text-3xl font-bold tracking-tighter text-primary uppercase">KOVA Song Archive</h1>
        <nav class="hidden md:flex gap-8 font-label-technical text-xs uppercase tracking-widest">
            <a class="border-b border-primary pb-1" href="#">Archive</a>
            <a class="opacity-40" href="#">Technical Specs</a>
        </nav>
    </header>

    <main class="flex-grow px-10 py-20 flex flex-col items-center">
        <div class="w-full max-w-4xl flex flex-col gap-8" id="archive-container">
            <div class="text-center py-20 animate-pulse" id="loading-state">
                <span class="font-label-technical text-xs uppercase tracking-widest opacity-50">Fetching archive data...</span>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-on-surface/10 flex justify-between px-10">
        <span class="font-label-technical text-[10px] opacity-60">© 2024 KOVA RS / 48kHz</span>
    </footer>

    <script>
        // REEMPLAZA ESTE ENLACE con tu enlace de "Publicar en la Web" (formato CSV)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-TU-ID-AQUI/pub?gid=0&output=csv';

        async function fetchArchive() {
            const container = document.getElementById('archive-container');
            const loading = document.getElementById('loading-state');
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/);
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                const items = [];
                
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const obj = {};
                    headers.forEach((header, index) => {
                        obj[header] = (values[index] || "").trim().replace(/^"|"$/g, '');
                    });
                    items.push(obj);
                }

                if (loading) loading.remove();
                
                items.forEach(item => {
                    const isHighlighted = item.Highlight && item.Highlight.toLowerCase() === 'sí';
                    const highlightClass = isHighlighted ? 'border-b-2 border-[#7ed321]' : 'border-primary/10';
                    
                    const html = `
                        <div class="bg-[#ede9e1] relative flex flex-col md:flex-row items-start md:items-center justify-between p-10 border ${highlightClass} gap-8">
                            <span class="absolute top-4 right-6 font-label-technical text-[10px] text-[#9a9a9a] uppercase tracking-widest">KOVA RS / 48kHz</span>
                            <div class="flex items-center gap-10">
                                <div class="w-28 h-28 overflow-hidden shrink-0 bg-white">
                                    <img alt="${item.Song}" class="w-full h-full object-cover grayscale contrast-125 album-cover-transition hover:grayscale-0" src="${item.Cover || ''}" onerror="this.style.display='none'"/>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <h2 class="text-xl text-[#0b0b0b] font-bold">${item.Song || 'Unknown'}</h2>
                                    <p class="text-sm text-[#0b0b0b] opacity-80">${item.Artist || 'Artist'}</p>
                                    <div class="font-label-technical text-[10px] text-[#9a9a9a] uppercase tracking-widest mt-2">
                                        ${item.Date || ''} | ${item.Credits || ''}
                                    </div>
                                </div>
                            </div>
                            <a href="${item.Link || '#'}" target="_blank" class="border border-primary bg-primary text-white px-8 py-3 font-label-technical text-[10px] uppercase tracking-widest hover:bg-transparent hover:text-black transition-all">
                                Escuchar
                            </a>
                        </div>`;
                    container.insertAdjacentHTML('beforeend', html);
                });
            } catch (e) {
                loading.innerHTML = "Error cargando datos. Revisa el enlace CSV.";
            }
        }
        document.addEventListener('DOMContentLoaded', fetchArchive);
    </script>
</body>
</html>
