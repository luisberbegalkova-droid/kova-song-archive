<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KOVA Song Archive - Portfolio Visualizer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background": "#fdf9f1",
                        "on-background": "#1c1c17",
                        "surface-container": "#f1ede5",
                        "secondary": "#5e5e5e",
                        "kova-green": "#7ed321"
                    },
                    fontFamily: {
                        "body-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "label-technical": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Efecto 3D y Borde KOVA */
        .portfolio-item {
            transition: all 400ms cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(0,0,0,0.05);
            transform: translateY(0);
        }
        
        .portfolio-item:hover {
            border-color: #7ed321;
            border-width: 3px;
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .album-cover-transition { transition: all 500ms ease-in-out; }
        .portfolio-item:hover .album-cover-transition { filter: grayscale(0); }
        
        [v-cloak] { display: none; }
        
        /* Estilo para los botones de filtro */
        .filter-btn.active {
            background-color: #000000;
            color: #ffffff;
            border-color: #000000;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased">
    
    <header class="bg-background w-full border-b border-on-surface/10 flex flex-col items-center px-6 md:px-10 py-6 md:py-8 gap-6">
        <div class="flex justify-between items-center w-full max-w-6xl">
            <h1 class="text-2xl md:text-3xl font-bold tracking-tighter text-primary uppercase">KOVA Song Archive</h1>
            <span class="font-label-technical text-[10px] text-[#9a9a9a] uppercase tracking-[0.3em] hidden md:block">Boutique Recording Studio</span>
        </div>

        <div id="filter-container" class="flex flex-wrap justify-center gap-3 font-label-technical text-[10px] uppercase tracking-widest pt-4">
            <button onclick="filterByGenre('all')" class="filter-btn active border border-primary/20 px-4 py-2 hover:border-primary transition-all">All Tracks</button>
            </div>
    </header>

    <main class="flex-grow px-4 md:px-10 py-12 flex flex-col items-center">
        <div class="w-full max-w-4xl flex flex-col gap-8" id="archive-container">
            <div class="text-center py-20 animate-pulse" id="loading-state">
                <span class="font-label-technical text-xs uppercase tracking-widest opacity-50 text-[#9a9a9a]">Reading Metadata / 48kHz...</span>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-on-surface/10 flex justify-between px-10">
        <span class="font-label-technical text-[10px] text-[#9a9a9a] uppercase tracking-widest">© 2026 KOVA RS / 48kHz</span>
    </footer>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCZ5H_tX3r41I_npaw0nNJWxoGGucLKvTO2mC0w1SdSm8g7T1nEte1wcVhldjT14u-tygZMCnt9eVY/pub?gid=0&single=true&output=csv';
        let allSongs = [];

        async function fetchArchive() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/);
                const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
                
                allSongs = [];
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const obj = {};
                    headers.forEach((header, index) => {
                        obj[header] = (values[index] || "").trim().replace(/^"|"$/g, '');
                    });
                    allSongs.push(obj);
                }

                renderFilters();
                renderItems(allSongs);
                document.getElementById('loading-state')?.remove();
            } catch (e) {
                console.error(e);
            }
        }

        function renderFilters() {
            const filterContainer = document.getElementById('filter-container');
            const genres = [...new Set(allSongs.map(s => s.Genre).filter(g => g))];
            
            genres.forEach(genre => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn border border-primary/20 px-4 py-2 hover:border-primary transition-all';
                btn.textContent = genre;
                btn.onclick = () => filterByGenre(genre, btn);
                filterContainer.appendChild(btn);
            });
        }

        function filterByGenre(genre, btnElement = null) {
            // Actualizar estado de botones
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            else document.querySelector('.filter-btn').classList.add('active');

            const filtered = genre === 'all' 
                ? allSongs 
                : allSongs.filter(s => s.Genre === genre);
            
            renderItems(filtered);
        }

        function renderItems(items) {
            const container = document.getElementById('archive-container');
            container.innerHTML = ''; // Limpiar

            items.forEach(item => {
                const coverContent = (item.Cover && item.Cover.trim() !== "") 
                    ? `<img alt="${item.Song}" class="w-full h-full object-cover grayscale contrast-125 album-cover-transition" src="${item.Cover}" onerror="this.parentElement.innerHTML='<span class=\'material-symbols-outlined text-4xl text-[#9a9a9a] opacity-40\'>album</span>'"/>`
                    : `<span class="material-symbols-outlined text-4xl text-[#9a9a9a] opacity-40">album</span>`;

                const html = `
                    <div class="portfolio-item bg-[#ede9e1] relative flex flex-col md:flex-row items-center justify-between p-6 md:p-10 gap-6 md:gap-8">
                        <span class="absolute top-3 right-4 font-label-technical text-[9px] text-[#9a9a9a] uppercase tracking-widest opacity-80">KOVA RS / 48kHz</span>
                        
                        <div class="flex flex-col md:flex-row items-center text-center md:text-left gap-6 md:gap-10 w-full">
                            <div class="w-28 h-28 overflow-hidden shrink-0 bg-white border border-black/5 flex items-center justify-center shadow-sm">
                                ${coverContent}
                            </div>

                            <div class="flex flex-col gap-1 w-full">
                                <h2 class="text-xl md:text-2xl text-[#0b0b0b] font-bold tracking-tight">${item.Song}</h2>
                                <p class="text-sm md:text-base text-[#0b0b0b] opacity-80">${item.Artist}</p>
                                
                                <div class="flex flex-row flex-wrap justify-center md:justify-start gap-x-3 gap-y-1 mt-4">
                                    <span class="font-label-technical text-[9px] text-[#9a9a9a] uppercase tracking-widest border border-black/10 px-2 py-1">${item.Genre}</span>
                                    <span class="font-label-technical text-[9px] text-[#9a9a9a] uppercase tracking-widest border border-black/10 px-2 py-1">${item.Date}</span>
                                    <span class="font-label-technical text-[9px] text-[#9a9a9a] uppercase tracking-widest border border-black/10 px-2 py-1">${item.Credits}</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center w-full md:w-auto">
                            <a href="${item.Link}" target="_blank" class="w-full md:w-auto bg-black text-white px-8 py-3 font-label-technical text-[10px] uppercase tracking-[0.2em] hover:bg-kova-green hover:text-black transition-all text-center">
                                Escuchar
                            </a>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        document.addEventListener('DOMContentLoaded', fetchArchive);
    </script>
</body>
</html>
